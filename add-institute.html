<main>

<div class="card">

<h2>Register New Institute</h2>

<form id="instituteForm">

<label>Institute Name</label>
<input
type="text"
id="name"
required>

<label>Email</label>
<input
type="email"
id="email"
required>

<label>Phone Number</label>
<input
type="text"
id="phone"
maxlength="10"
required>

<label>Address</label>
<textarea
id="address"
rows="3"
required></textarea>

<label>Username</label>
<input
type="text"
id="username"
required>

<label>Password</label>
<input
type="password"
id="password"
required>

<button type="submit">

Add Institute

</button>

</form>

<p id="message"></p>

</div>
